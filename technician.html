<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهام الفني - Royal Gas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --royal-blue: #0b4a99;
            --royal-red: #ce2029;
            --bg-body: #f4f7fa;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
            --success: #276749;
            --warning: #9c4221;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        
        body { 
            margin: 0; 
            background: var(--bg-body); 
            color: #333; 
            padding-bottom: 40px;
        }

        /* Header Style */
        .header { 
            background: var(--royal-blue); 
            color: white; 
            padding: 30px 20px; 
            border-radius: 0 0 30px 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            margin-bottom: 25px;
        }
        .header h2 { margin: 0; font-weight: 900; font-size: 24px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }
        
        .logout-btn { 
            position: absolute; left: 20px; top: 30px; 
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 6px 15px; border-radius: 10px; font-size: 13px;
            cursor: pointer; font-weight: 700;
        }

        /* Stats Grid */
        .stats-container { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; padding: 0 20px; margin-bottom: 25px; 
        }
        .stat-card { 
            background: white; padding: 15px; border-radius: 20px; 
            text-align: center; box-shadow: var(--card-shadow);
            border-bottom: 4px solid #ddd;
        }
        .stat-card.pending { border-bottom-color: var(--royal-red); }
        .stat-card.completed { border-bottom-color: var(--success); }
        .stat-card small { color: #888; font-weight: 700; display: block; margin-bottom: 5px; font-size: 12px; }
        .stat-card span { font-size: 26px; font-weight: 900; color: var(--royal-blue); }

        /* Task Card Style */
        #tasksList { padding: 0 20px; }
        .task-card { 
            background: white; border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; box-shadow: var(--card-shadow); 
            border-right: 10px solid var(--royal-red); 
            position: relative; overflow: hidden;
        }
        .task-card::before {
            content: ""; position: absolute; top: 0; left: 0; 
            width: 100%; height: 5px; background: linear-gradient(to left, var(--royal-red), var(--royal-blue));
        }

        .client-name { color: var(--royal-blue); font-size: 20px; font-weight: 900; margin-bottom: 15px; display: block; }
        
        .info-item { margin-bottom: 10px; display: flex; align-items: flex-start; font-size: 15px; line-height: 1.5; }
        .info-item b { min-width: 90px; color: #555; font-weight: 700; }
        .info-item span { color: #333; font-weight: 600; flex: 1; }

        /* Badge for Location */
        .gov-badge {
            background: #edf2f7; color: var(--royal-blue);
            padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 12px;
            display: inline-block; margin-bottom: 10px;
        }

        /* Buttons Area */
        .actions-area { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; 
            padding: 14px; border-radius: 12px; font-weight: 800; 
            text-decoration: none; border: none; cursor: pointer; 
            font-size: 14px; width: 100%; margin-bottom: 12px;
        }
        
        .btn-call { background: #eef4ff; color: var(--royal-blue); border: 1px solid #d0e0f5; }
        .btn-upload { background: #fff; color: #555; border: 2px dashed #cbd5e0; }
        .btn-done { background: var(--success); color: white; box-shadow: 0 5px 15px rgba(39,103,73,0.3); }
        .btn-delay { background: var(--warning); color: white; flex: 1; }
        .btn-cancel { background: #f8f9fa; color: var(--royal-red); border: 1px solid #f1f1f1; flex: 1; }

        .delay-box { 
            display: none; background: #fffaf0; padding: 15px; 
            border-radius: 15px; margin-bottom: 15px; border: 1px solid #feebc8; 
        }
        .delay-box input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit; 
        }

        .loader { display: none; font-size: 14px; color: var(--royal-blue); text-align: center; font-weight: 800; margin: 15px 0; }
        .gps-notice { font-size: 12px; color: #718096; text-align: center; margin-top: 8px; font-weight: 600; }
        
        .upload-input { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <button class="logout-btn" id="logoutBtn">خروج</button>
        <h2>لوحة المهام اليومية</h2>
        <p id="techEmail"></p>
    </div>

    <div class="stats-container">
        <div class="stat-card pending">
            <small>مهام مطلوبة</small>
            <span id="pendingCount">0</span>
        </div>
        <div class="stat-card completed">
            <small>إجمالي المنتهي</small>
            <span id="doneCount">0</span>
        </div>
    </div>

    <div id="tasksList">
        <p style="text-align: center; color: #999;">جاري تحديث قائمة المهام...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFpWeQWHeLnNIC-81UNEEVz_LCa8NMWIc",
        authDomain: "royal-gas.firebaseapp.com",
        projectId: "royal-gas",
        storageBucket: "royal-gas.firebasestorage.app",
        messagingSenderId: "1091464548493",
        appId: "1:1091464548493:web:c2b24978817839da7cd2c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const IMGBB_API_KEY = "621693c6848341977008ebc613225c19";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('techEmail').innerText = "الفني: " + user.email;
            const q = query(collection(db, "tasks"), where("techEmail", "==", user.email));
            
            onSnapshot(q, (snapshot) => {
                let html = "";
                let pendingNum = 0;
                let doneNum = 0;

                snapshot.forEach((snapshotDoc) => {
                    const t = snapshotDoc.data();
                    const id = snapshotDoc.id;

                    if (t.status !== "معلق") {
                        doneNum++;
                    } else {
                        pendingNum++;
                        html += `
                            <div class="task-card">
                                <span class="gov-badge">📍 ${t.gov || 'غير محدد'}</span>
                                <b class="client-name">👤 ${t.clientName}</b>
                                
                                <div class="info-item"><b>🏠 العنوان:</b> <span>${t.address}</span></div>
                                <div class="info-item"><b>📱 الهاتف:</b> <span>${t.phone}</span></div>
                                <div class="info-item"><b>🛠️ الشكوى:</b> <span>${t.description || t.complaint || 'صيانة عامة'}</span></div>
                                <div class="info-item"><b>📅 التاريخ:</b> <span>${t.date}</span></div>

                                <div class="actions-area">
                                    <a href="tel:${t.phone}" class="btn btn-call">اتصال بالعميل 📞</a>
                                    
                                    <label for="file_${id}" class="btn btn-upload" id="label_${id}">📸 تصوير الفاتورة وإغلاق</label>
                                    <input type="file" id="file_${id}" class="upload-input" accept="image/*" onchange="window.handleUpload('${id}')">
                                    
                                    <div id="loader_${id}" class="loader">جاري الرفع... ⏳</div>
                                    
                                    <button onclick="window.finishTask('${id}')" class="btn btn-done" id="btnDone_${id}" style="display:none;">تأكيد الإغلاق النهائي ✅</button>

                                    <div style="display: flex; gap: 10px;">
                                        <button onclick="window.toggleDelayBox('${id}')" class="btn btn-delay">تأجيل ⏳</button>
                                        <button onclick="window.cancelTask('${id}')" class="btn btn-cancel">إلغاء ❌</button>
                                    </div>

                                    <div id="delayBox_${id}" class="delay-box">
                                        <label style="font-size:12px; font-weight:bold; color:var(--warning);">موعد الزيارة القادم:</label>
                                        <input type="date" id="newDate_${id}">
                                        <button onclick="window.confirmDelay('${id}')" class="btn btn-done" style="margin-bottom:0;">تأكيد التأجيل</button>
                                    </div>

                                    <p class="gps-notice" id="gps_${id}">سيتم تسجيل موقعك تلقائياً عند الإتمام</p>
                                </div>
                            </div>`;
                    }
                });

                document.getElementById('pendingCount').innerText = pendingNum;
                document.getElementById('doneCount').innerText = doneNum;
                
                if (pendingNum === 0) {
                    html = "<div style='text-align:center; margin-top:60px; color:#aaa;'><div style='font-size:50px;'>✨</div>عمل رائع!<br>لقد انتهيت من جميع المهام.</div>";
                }
                document.getElementById('tasksList').innerHTML = html;
            });
        } else {
            window.location.href = "index.html";
        }
    });

    // الدوال الوظيفية (نفس منطق الكود السابق مع تحسين بسيط)
    window.toggleDelayBox = (id) => {
        const box = document.getElementById(`delayBox_${id}`);
        box.style.display = box.style.display === "block" ? "none" : "block";
    };

    window.confirmDelay = async (id) => {
        const newDate = document.getElementById(`newDate_${id}`).value;
        if (!newDate) return alert("برجاء اختيار التاريخ");
        try {
            const today = new Date().toISOString().split('T')[0];
            await updateDoc(doc(db, "tasks", id), {
                status: "مؤجلة",
                date: newDate,
                updateTime: new Date().toLocaleString()
            });
            alert("تم التأجيل");
        } catch (e) { alert("حدث خطأ"); }
    };

    window.cancelTask = async (id) => {
        if (confirm("هل تريد إلغاء المهمة؟")) {
            try {
                await updateDoc(doc(db, "tasks", id), {
                    status: "ملغاة",
                    finishTime: new Date().toLocaleString()
                });
            } catch (e) { alert("حدث خطأ"); }
        }
    };

    window.handleUpload = async (taskId) => {
        const fileInput = document.getElementById(`file_${taskId}`);
        const loader = document.getElementById(`loader_${taskId}`);
        const label = document.getElementById(`label_${taskId}`);
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        if (!fileInput.files[0]) return;
        
        loader.style.display = "block";
        label.style.display = "none";
        
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        
        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) {
                doneBtn.setAttribute('data-url', result.data.url);
                doneBtn.style.display = "flex";
                loader.innerHTML = "✅ تم رفع الصورة بنجاح";
                loader.style.color = "var(--success)";
            }
        } catch (e) {
            alert("خطأ في الرفع");
            label.style.display = "flex";
            loader.style.display = "none";
        }
    };

    window.finishTask = async (taskId) => {
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        const imageUrl = doneBtn.getAttribute('data-url');
        const gpsStatus = document.getElementById(`gps_${taskId}`);
        gpsStatus.innerText = "📍 جاري تحديد الموقع...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const locationString = `${position.coords.latitude},${position.coords.longitude}`;
                    await updateDoc(doc(db, "tasks", taskId), {
                        status: "تمت الزيارة",
                        billPhoto: imageUrl,
                        finishTime: new Date().toLocaleString(),
                        location: locationString
                    });
                    alert("تم إغلاق المهمة بنجاح ✅");
                } catch (e) { alert("خطأ في التحديث"); }
            }, () => { 
                alert("يجب تفعيل GPS لإغلاق المهمة");
            }, { enableHighAccuracy: true });
        } else {
            alert("المتصفح لا يدعم الموقع");
        }
    };

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });
</script>
</body>
</html>
