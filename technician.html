<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهام الفني - Royal Gas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        :root { --main: #0b4a99; --accent: #ce2029; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { background: var(--main); color: white; padding: 25px 20px; border-radius: 0 0 25px 25px; margin: -15px -15px 25px -15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-weight: 800; font-size: 20px; }
        
        .task-card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-right: 8px solid var(--accent); transition: 0.3s; }
        .task-card.completed { border-right-color: var(--success); opacity: 0.9; }
        
        .task-status { float: left; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .status-pending { background: #ffebee; color: var(--accent); }
        .status-done { background: #e8f5e9; color: var(--success); }

        .client-name { color: var(--main); font-size: 19px; font-weight: 800; margin: 0 0 15px 0; display: block; }
        .info-item { margin-bottom: 12px; display: flex; align-items: flex-start; font-size: 15px; line-height: 1.5; }
        .info-item b { min-width: 80px; color: #666; font-weight: 600; }
        
        .actions-area { margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; transition: 0.2s; font-size: 15px; width: 100%; margin-bottom: 10px; }
        
        .btn-call { background: #e3f2fd; color: var(--main); }
        .btn-upload { background: #f5f5f5; color: #444; border: 2px dashed #ccc; }
        .btn-done { background: var(--success); color: white; }
        .btn:active { transform: scale(0.97); }

        .upload-input { display: none; }
        .loader { display: none; font-size: 13px; color: var(--main); text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📋 مهامي اليومية</h2>
        <p id="techEmail" style="font-size: 13px; opacity: 0.8; margin-top: 8px;"></p>
    </div>

    <div id="tasksList">
        <p style="text-align: center; color: #999;">جاري جلب البلاغات...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBZPQRSKGGINHkiReNu5Ly_gArUipQVYDs",
        authDomain: "royal-gas-system.firebaseapp.com",
        projectId: "royal-gas-system",
        storageBucket: "royal-gas-system.firebasestorage.app",
        messagingSenderId: "115245633400",
        appId: "1:115245633400:web:747a95eb2774360dd4828d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const IMGBB_API_KEY = "621693c6848341977008ebc613225c19";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('techEmail').innerText = "فني: " + user.email;
            const q = query(collection(db, "tasks"), where("techEmail", "==", user.email));
            
            onSnapshot(q, (snapshot) => {
                let html = "";
                if (snapshot.empty) {
                    html = "<div style='text-align:center; margin-top:40px; color:#888;'>☕ لا توجد مهام حالية، استمتع بوقتك!</div>";
                } else {
                    snapshot.forEach((snapshotDoc) => {
                        const t = snapshotDoc.data();
                        const id = snapshotDoc.id;
                        const isDone = t.status === "تمت الزيارة";

                        html += `
                            <div class="task-card ${isDone ? 'completed' : ''}">
                                <span class="task-status ${isDone ? 'status-done' : 'status-pending'}">
                                    ${t.status}
                                </span>
                                <b class="client-name">👤 ${t.clientName}</b>
                                
                                <div class="info-item"><b>📍 العنوان:</b> <span>${t.address}</span></div>
                                <div class="info-item"><b>📞 تليفون:</b> <span>${t.phone}</span></div>
                                <div class="info-item"><b>💬 الشكوى:</b> <span>${t.complaint}</span></div>
                                <div class="info-item"><b>📅 التاريخ:</b> <span>${t.date}</span></div>

                                <div class="actions-area">
                                    <a href="tel:${t.phone}" class="btn btn-call">اتصال بالعميل 📞</a>
                                    
                                    ${!isDone ? `
                                        <label for="file_${id}" class="btn btn-upload" id="label_${id}">
                                            📸 إرفاق صورة الفاتورة
                                        </label>
                                        <input type="file" id="file_${id}" class="upload-input" accept="image/*" onchange="window.handleUpload('${id}')">
                                        
                                        <div id="loader_${id}" class="loader">جاري رفع الفاتورة...</div>
                                        
                                        <button onclick="window.finishTask('${id}')" class="btn btn-done" id="btnDone_${id}" style="display:none;">
                                            إتمام الزيارة ✅
                                        </button>
                                    ` : `
                                        <div style="text-align:center; color:var(--success); font-weight:bold; padding:10px;">
                                            تم إنهاء هذه المهمة بنجاح
                                        </div>
                                    `}
                                </div>
                            </div>`;
                    });
                }
                document.getElementById('tasksList').innerHTML = html;
            });
        } else {
            window.location.href = "index.html";
        }
    });

    // وظيفة معالجة الرفع
    window.handleUpload = async (taskId) => {
        const fileInput = document.getElementById(`file_${taskId}`);
        const loader = document.getElementById(`loader_${taskId}`);
        const label = document.getElementById(`label_${taskId}`);
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        
        if (!fileInput.files[0]) return;

        loader.style.display = "block";
        label.style.display = "none";

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                // حفظ الرابط مؤقتاً في الزر
                doneBtn.setAttribute('data-url', result.data.url);
                doneBtn.style.display = "flex";
                loader.innerText = "✅ تم رفع الصورة بنجاح";
            }
        } catch (e) {
            alert("فشل الرفع، تأكد من الإنترنت");
            label.style.display = "flex";
            loader.style.display = "none";
        }
    };

    // وظيفة الإنهاء النهائي
    window.finishTask = async (taskId) => {
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        const imageUrl = doneBtn.getAttribute('data-url');

        if (!imageUrl) return alert("حدث خطأ في رابط الصورة");

        try {
            const taskRef = doc(db, "tasks", taskId);
            await updateDoc(taskRef, {
                status: "تمت الزيارة",
                billPhoto: imageUrl,
                finishTime: new Date().toLocaleString()
            });
            alert("تم إغلاق البلاغ وإرساله للمدير");
        } catch (e) {
            alert("خطأ في تحديث الحالة");
        }
    };

</script>
</body>
</html>
